<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>where2meet - Coordinate Group Event Locations</title>
  
  <!-- Leaflet Map CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" 
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" 
        crossorigin="" />
        
  <!-- Custom CSS stylesheet -->
  <link rel="stylesheet" href="css/style.css">
  
  <meta name="description" content="where2meet helps you coordinate locations for group events.">
</head>
<body>
  <header>
    <a href="index.html" class="logo">
      <div class="logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: white;"><path d="M12 2a8 8 0 0 0-8 8c0 5.25 8 12 8 12s8-6.75 8-12a8 8 0 0 0-8-8z"></path><circle cx="12" cy="10" r="3"></circle></svg>
      </div>
      <span>where2meet</span>
    </a>
  </header>

  <main>
    <div class="landing-container">
      <!-- Left sidebar: Form configuration -->
      <div class="landing-sidebar glass-panel" style="padding-top: 2.5rem;">
        <!-- Navigation Tabs to Join or Create -->
        <div class="tab-container" style="display: flex; border-bottom: 1px solid var(--panel-border); margin-bottom: 1.5rem;">
          <button type="button" class="tab-btn active" id="tab-join" style="flex: 1; background: transparent; border: none; border-bottom: 2px solid var(--primary); padding: 0.75rem; font-weight: 600; cursor: pointer; color: var(--text-main); font-family: inherit;">Join Existing Event</button>
          <button type="button" class="tab-btn" id="tab-create" style="flex: 1; background: transparent; border: none; border-bottom: 2px solid transparent; padding: 0.75rem; font-weight: 600; cursor: pointer; color: var(--text-muted); font-family: inherit;">Create New Event</button>
        </div>

        <!-- Join Event Form (Visible by default) -->
        <form id="join-event-form">
          <div class="form-group" style="margin-bottom: 1.5rem;">
            <label for="join-event-id">Event ID or URL</label>
            <input type="text" id="join-event-id" class="form-control" placeholder="e.g., Summer-Reunion-2026 or paste full link" required autocomplete="off">
            <span style="font-size: 0.75rem; color: var(--text-dim); margin-top: 0.5rem; display: inline-block;">Enter the short Event ID or paste the complete sharing URL.</span>
          </div>

          <button type="submit" class="btn btn-primary" id="join-submit-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
            Join Event Map
          </button>
        </form>

        <!-- Create Event Form (Hidden by default) -->
        <form id="create-event-form" style="display: none;">
          <div class="form-group">
            <label for="event-name">Event Name</label>
            <input type="text" id="event-name" class="form-control" placeholder="e.g., Summer Reunion 2026" required autocomplete="off">
          </div>
          
          <div class="form-group">
            <label for="event-desc">Description (Optional)</label>
            <textarea id="event-desc" class="form-control" placeholder="e.g., Pin where you're starting from so we can coordinate rides!"></textarea>
          </div>

          <!-- Event ID Generation -->
          <div class="form-group">
            <label for="event-id">Event ID</label>
            <div style="display: flex; gap: 0.5rem; align-items: center;">
              <input type="text" id="event-id" class="form-control" placeholder="ID sequence" required autocomplete="off" style="font-family: monospace; font-size: 0.9rem;" pattern="[a-zA-Z0-9\-]+">
              <button type="button" id="btn-generate-id" class="btn btn-secondary" style="width: auto; padding: 0.65rem 0.85rem; font-size: 0.8rem;">Generate</button>
            </div>
          </div>

          <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem;">
            <div class="form-group" style="flex: 1; margin-bottom: 0;">
              <label>Default Lat</label>
              <input type="text" id="default-lat" class="form-control" value="20.0" readonly style="opacity: 0.75; font-size: 0.85rem;">
            </div>
            <div class="form-group" style="flex: 1; margin-bottom: 0;">
              <label>Default Lng</label>
              <input type="text" id="default-lng" class="form-control" value="0.0" readonly style="opacity: 0.75; font-size: 0.85rem;">
            </div>
            <div class="form-group" style="width: 70px; margin-bottom: 0;">
              <label>Zoom</label>
              <input type="text" id="default-zoom" class="form-control" value="2" readonly style="opacity: 0.75; text-align: center; font-size: 0.85rem;">
            </div>
          </div>

          <button type="submit" class="btn btn-primary" id="submit-btn" style="margin-top: 1rem;">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            Create Event Map
          </button>
        </form>
      </div>

      <!-- Right sidebar: Interactive map config -->
      <div class="map-config-container glass-panel">
        <div class="map-label-overlay">
          <h3>Set Starting View</h3>
          <p>Pan and zoom the map to select the default viewport for your participants when they join.</p>
        </div>
        <div class="map-wrapper" id="preview-map"></div>
      </div>
    </div>
  </main>

  <footer>
    <p>where2meet &copy; 2026 &bull; Coordinate locations for group events.</p>
  </footer>

  <!-- Leaflet Map JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" 
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" 
          crossorigin=""></script>
          
  <!-- Client API & Page scripts -->
  <script src="js/api.js"></script>
  <script src="js/index.js"></script>
</body>
</html>
